name: Deploy Staging

# Se dispara cuando el workflow "CI" TERMINA sobre la rama staging —
# nunca corre si CI no pasó primero. workflow_dispatch queda para
# redisparar un deploy manualmente sin necesidad de un push nuevo.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging]
  workflow_dispatch: {}

jobs:
  deploy-frontend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy a Vercel (entorno preview = staging)
        run: |
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy en Render (deploy hook)
        run: curl -f -sS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
